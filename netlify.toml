[build]
    command = "gulp build:comments && hugo && npx netlify-lambda build src/functions"
    publish = "/public"
    functions = "/functions"

[context.production]
    command = "gulp build:comments && hugo && npx netlify-lambda build src/functions"
    functions = "/functions"
    [context.production.environment]
        HUGO_VERSION = "0.81.0"
        HUGO_ENV = "production"